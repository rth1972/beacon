<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4d157"/>
      <stop offset="100%" stop-color="#ea9322"/>
    </linearGradient>
  </defs>

  <!-- Phone body -->
  <rect x="16" y="2" width="68" height="96" rx="8" fill="none" stroke="url(#g)" stroke-width="2.2"/>

  <!-- Screen -->
  <rect x="20" y="10" width="60" height="82" rx="4" fill="none" stroke="url(#g)" stroke-width="0.6" opacity="0.35"/>

  <!-- Camera -->
  <circle cx="50" cy="6" r="1.8" fill="none" stroke="url(#g)" stroke-width="1.2"/>

  <!-- Home bar -->
  <rect x="38" y="92" width="24" height="2.5" rx="1.25" fill="none" stroke="url(#g)" stroke-width="1.5"/>

  <!-- Side buttons -->
  <rect x="14" y="32" width="2" height="10" rx="0.8" fill="url(#g)" opacity="0.5"/>
  <rect x="14" y="46" width="2" height="10" rx="0.8" fill="url(#g)" opacity="0.5"/>
  <rect x="84" y="38" width="2" height="14" rx="0.8" fill="url(#g)" opacity="0.5"/>

  <!-- Notification card -->
  <rect x="24" y="20" width="52" height="40" rx="4" fill="#161100" stroke="url(#g)" stroke-width="1.2"/>

  <!-- Bell icon inside notification -->
  <rect x="28" y="25" width="12" height="12" rx="3" fill="none" stroke="url(#g)" stroke-width="1"/>
  <path d="M33,27.5c-0.8,0-1.5,0.7-1.5,1.5v1l-1,1c-0.3,0.3-0.2,0.7,0,0.9c1,0.6,2.2,0.9,3.5,0.9s2.5-0.3,3.5-0.9c0.2-0.2,0.3-0.6,0-0.9l-1-1v-1c0-0.8-0.7-1.5-1.5-1.5z" fill="none" stroke="url(#g)" stroke-width="0.7"/>
  <circle cx="33" cy="33" r="0.6" fill="none" stroke="url(#g)" stroke-width="0.7"/>

  <!-- App name -->
  <rect x="43" y="27" width="18" height="2" rx="1" fill="url(#g)" opacity="0.5"/>
  <rect x="63" y="27" width="10" height="2" rx="1" fill="url(#g)" opacity="0.2"/>

  <!-- Title line -->
  <rect x="28" y="40" width="44" height="2.5" rx="1.25" fill="url(#g)" opacity="0.5"/>
  <!-- Body lines -->
  <rect x="28" y="46" width="36" height="2" rx="1" fill="url(#g)" opacity="0.28"/>
  <rect x="28" y="52" width="26" height="2" rx="1" fill="url(#g)" opacity="0.18"/>

  <!-- Notification badge -->
  <circle cx="71" cy="22" r="5.5" fill="#cc2200"/>
  <text x="71" y="25" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#fff">!</text>
</svg>
