  <!-- Side button right -->
  <rect x="1800" y="300" width="4" height="60" rx="2" fill="#7a621b" opacity="0.5"/>

  <!-- Notification card on screen -->
  <rect x="1516" y="180" width="248" height="130" rx="12" fill="#fff" stroke="#7a621b" stroke-width="1.8"/>

  <!-- App icon with bell -->
  <rect x="1526" y="192" width="38" height="38" rx="8" fill="none" stroke="#7a621b" stroke-width="1.5"/>
  <path d="M1545,200c-2,0-3.5,1.5-3.5,3.5v2l-2,2c-0.8,0.8-0.5,2,0,2.5c2.5,1.5,5.5,2.5,8.5,2.5s6-1,8.5-2.5c0.5-0.5,0.8-1.7,0-2.5l-2-2v-2c0-2-1.5-3.5-3.5-3.5z" fill="none" stroke="#7a621b" stroke-width="1.2"/>
