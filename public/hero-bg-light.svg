  <!-- App name -->
  <rect x="1572" y="196" width="70" height="6" rx="3" fill="#7a621b" opacity="0.5"/>
  <rect x="1650" y="196" width="40" height="6" rx="3" fill="#7a621b" opacity="0.2"/>
  <!-- Title line -->
  <rect x="1526" y="242" width="200" height="8" rx="4" fill="#7a621b" opacity="0.5"/>
  <!-- Body lines -->
  <rect x="1526" y="260" width="160" height="6" rx="3" fill="#7a621b" opacity="0.28"/>
  <rect x="1526" y="276" width="120" height="6" rx="3" fill="#7a621b" opacity="0.18"/>
  <!-- Second body line -->
  <rect x="1526" y="292" width="140" height="6" rx="3" fill="#7a621b" opacity="0.12"/>

  <!-- Red badge -->
  <circle cx="1748" cy="186" r="16" fill="#cc2200"/>
  <text x="1748" y="193" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">!</text>

  <!-- Faint content lines below notification -->
  <rect x="1516" y="330" width="180" height="5" rx="2.5" fill="#7a621b" opacity="0.08"/>
  <rect x="1516" y="345" width="220" height="5" rx="2.5" fill="#7a621b" opacity="0.06"/>
  <rect x="1516" y="360" width="140" height="5" rx="2.5" fill="#7a621b" opacity="0.04"/>
